# Nginx Configuration Template for eBay Manager Bot Webhooks
# 
# INSTRUCTIONS:
# 1. Replace "your-domain.com" with your actual domain name
# 2. Save this file as /etc/nginx/conf.d/your-domain.com.conf or /etc/nginx/sites-available/your-domain.com
# 3. Run: sudo certbot --nginx -d your-domain.com (to get SSL certificate)
# 4. Test: sudo nginx -t
# 5. Reload: sudo systemctl reload nginx

server {
    server_name your-domain.com;

    # Optional: If you have a website at the root
    # root /var/www/your-domain.com/html;
    # index index.html;
    #
    # location / {
    #     try_files $uri $uri/ /index.html;
    # }

    # eBay Bot Webhook Endpoints (REQUIRED for bot webhooks)
    location /webhook/ {
        # Forward to bot running on localhost:8081
        # Change port if you configured WEBHOOK_PORT differently
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        
        # Forward original headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Allow large payloads from eBay
        client_max_body_size 10M;
    }

    # SSL Configuration (will be added by Certbot)
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP to HTTPS redirect (will be added by Certbot)
server {
    if ($host = your-domain.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name your-domain.com;
    return 404;
}
